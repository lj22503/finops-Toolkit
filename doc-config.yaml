package_name: FinOps Toolkit
package_description: 金融运营技能工具包 - 覆盖内容生产、活动策划、用户触达、数据分析、舆情监控、合规审查的全链路运营团队
target_users:
  - 互金运营从业者
  - 基金/理财运营团队
  - 金融科技公司运营岗

user_readme:
  hero_content: "互金运营全链路 Agent 团队 — 让你专注策略，把执行交给 AI"
  quick_start_template: |
    1. 说"帮我写一篇基金推广文案"开始
    2. AI 自动路由到对应技能线
    3. 合规审查后输出最终内容
  trigger_guide_source: manifest.skills[*].triggers

ai_readme:
  include_manifest: true
  include_pipeline: true
