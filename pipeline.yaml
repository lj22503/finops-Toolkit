name: finops-standard-flow
entry_role: router

stages:
  - name: route-intent
    role: router
    output_var: routed-role

  - name: strategy-formulation
    role: strategy-ops
    depends: [route-intent]
    output_var: strategy-result

  - name: execution
    parallel:
      - role: content-ops
        depends: [strategy-formulation]
      - role: campaign-ops
        depends: [strategy-formulation]
      - role: product-ops
        depends: [strategy-formulation]
    output_var: execution-result

  - name: compliance-check
    role: compliance-ops
    depends: [execution]
    input:
      content: stage://execution/result
    output_var: compliance-result

  - name: data-review
    role: data-ops
    depends: [compliance-check]
    input:
      context: stage://execution/result
    output_var: data-result
