name: finops-standard-flow

stages:
  - name: route-intent
    skill: router
    output_var: routed-role

  - name: strategy-formulation
    role: strategy-ops
    depends: [route-intent]
    output_var: strategy-result

  - name: execution
    parallel:
      - role: content-ops
        input: stage://strategy-formulation/strategy-result
      - role: campaign-ops
        input: stage://strategy-formulation/strategy-result
      - role: product-ops
        input: stage://strategy-formulation/strategy-result
    output_var: execution-result

  - name: compliance-review
    role: compliance-ops
    gate:
      blocks_if: compliance-failed

  - name: data-tracking
    role: data-ops
    parallel: true
    input: stage://execution/result
